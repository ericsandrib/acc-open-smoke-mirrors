# Stratos × Avantos — Onboarding Page Map manifest
#
# Maps stable page ids (P01–P16) to the .tsx files that drive each page in this
# prototype. The pagemap-scanner reads this file and produces a structured field
# inventory the stratos-pagemap agent pushes into the Stratos · Page Fields
# Notion DB.
#
# v2 conventions:
# - One entry per row in the canonical 16-page list. P14 is split into reviewer
#   variants (P14a–P14d) because each role has its own component.
# - `primary_files` are TSX files where labels/inputs/dropdowns live.
# - `enum_files` (optional) are pure-data files that contribute dropdown options
#   but no fields of their own.
# - No `prod_path_overrides` / `guardian_path_overrides` — the scanner does not
#   compare against upstream. Drift watching lives in the avantos-drift-watcher
#   agent (`/drift` slash command).
#
# When the prototype team adds or restructures a page, update this file in the
# same PR. The scanner is the source of truth for fields; this manifest is the
# source of truth for which files compose each page.

pages:
  - id: P01
    name: Relationships (main page)
    route: /relationships
    where_it_lives: Sidebar › Manage › Relationships
    primary_files:
      - src/pages/RelationshipsPage.tsx

  - id: P02
